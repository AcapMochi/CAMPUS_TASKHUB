<!DOCTYPE html>
<html lang=en>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale = 1.0">
  <title>Campus TaskHub - Task Done Poster</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/taskdoneposter.css">
  <script src="includes/js/auth.js"></script>
</head>

<body>

  <div class="done-main">
    <div class="done-card">
      <div class="checkmark">✅</div>
      <div class="done-title">
        <h1>Task Completed!</h1>
        <p id="runner-msg">Your runner has delivered your order</p>
      </div>

      <div class="receipt">
        <div class="receipt-rows">
          <div class="receipt-row">
            <span class="receipt-label">Task</span>
            <span class="receipt-value" id="taskName">Loading...</span>
          </div>
          <div class="receipt-row">
            <span class="receipt-label">Runner</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <img id="runnerAvatar" src="images/PFP.jpg"
                style="width:25px; height:25px; border-radius:50%; object-fit:cover;">
              <span class="receipt-value" id="taskRunner">Loading...</span>
            </div>
          </div>
        </div>
        <hr class="receipt-divider" />
        <div class="receipt-paid">
          <span class="receipt-paid-label">Total Paid (Inc. Fee)</span>
          <span class="receipt-paid-amount" id="taskPrice">RM 0.00</span>
        </div>
      </div>

      <div class="rating-panel">
        <p class="rating-label">Rate your runner</p>
        <div class="stars" id="starRow">
          <span class="star" data-value="1">&#9733;</span>
          <span class="star" data-value="2">&#9733;</span>
          <span class="star" data-value="3">&#9733;</span>
          <span class="star" data-value="4">&#9733;</span>
          <span class="star" data-value="5">&#9733;</span>
        </div>
        <textarea class="feedback-box" id="feedback" placeholder="Leave a comment (optional)..."></textarea>
      </div>

      <div class="done-actions">
        <button class="btn-submit" id="submitBtn">Submit Review</button>
        <button class="btn-skip" id="homeBtn" onclick="window.location.href='dashboard.html'">Skip</button>
      </div>
    </div>
  </div>

  <script>
    // 1. Star Rating Logic
    const stars = document.querySelectorAll('.star');
    let currentRating = 0;

    function updateStars(val) {
      stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= val));
    }

    stars.forEach(star => {
      star.addEventListener('click', () => {
        currentRating = parseInt(star.dataset.value);
        updateStars(currentRating);
      });
      star.addEventListener('mouseenter', () => updateStars(parseInt(star.dataset.value)));
      star.addEventListener('mouseleave', () => updateStars(currentRating));
    });

    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const taskId = urlParams.get('id');

      if (!taskId) {
        alert("Error: Missing Task ID");
        return;
      }

      // 2. Fetch Task Data on Load
      fetch(`includes/php/get_task_details.php?id=${taskId}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            const task = data.task;

            // Populate the text info
            document.getElementById('taskName').textContent = task.Title;
            document.getElementById('taskRunner').textContent = task.RunnerName || "Unknown";
            document.getElementById('runner-msg').textContent = `${task.RunnerName || "Your runner"} has completed your task!`;

            // --- ADDED: Populate Runner's Profile Picture ---
            // Assuming you add <img id="runnerAvatar" src="" style="width:30px; height:30px; border-radius:50%;"> 
            // near your #taskRunner element in the HTML
            const runnerAvatar = document.getElementById('runnerAvatar');
            if (runnerAvatar) {
              runnerAvatar.src = task.RunnerPic || 'images/PFP.jpg';
            }

            // Calculate total
            const reward = parseFloat(task.Reward_Amount);
            const totalPaid = reward + 0.50;
            document.getElementById('taskPrice').textContent = `RM ${totalPaid.toFixed(2)}`;
          } else {
            console.error("Failed to fetch task details:", data.message);
          }
        })
        .catch(err => console.error("Error loading task data:", err));

      // 3. Submission Logic
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.addEventListener('click', function () {
        const feedback = document.getElementById('feedback').value;

        if (currentRating === 0) {
          alert("Please select a rating!");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        fetch('includes/php/submit_review.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            task_id: taskId,
            rating: currentRating,
            feedback: feedback
          })
        })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'success') {
              alert("Review submitted successfully!");
              window.location.href = 'dashboard.html';
            } else {
              alert("Error: " + data.message);
              submitBtn.disabled = false;
              submitBtn.textContent = "Submit Review";
            }
          });
      });
    });
  </script>

</body>

</html>
