<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus TaskHub - System Leaderboard</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/leaderboard.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic" onerror="this.src='images/PFP.jpg'">
            </a>
        </div>
    </header>

    <main class="main-container">
        <div class="leaderboard-wrapper">
            <h1 class="page-title">Leaderboard</h1>
            
            <div class="filter-buttons">
                <button id="btn-posters" class="btn" onclick="switchTab('posters')">Top Posters</button>
                <button id="btn-runners" class="btn active-btn" onclick="switchTab('runners')">Top Runners</button>
            </div>

            <div class="leaderboard-card">
                <h2 class="card-title">TOP 100</h2>

                <div class="scroll-box">
                    <ul id="leaderboard-list">
                        </ul>
                </div>
            </div>
        </div>
    </main>

    <script src="includes/js/leaderboard.js"></script>
</body>
</html>
