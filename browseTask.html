<!DOCTYPE html>
<html lang="en">
<head>
    <title>Campus TaskHub - Browse Tasks</title>
    <link rel="stylesheet" href="/css/browse-task.css">
</head>

<body>

<header class="navbar">
    <div class="logo">
        CAMPUS <span class="logo-highlight">TASKHUB</span>
    </div>

    <nav class="nav-links">
        <a href="#">Dashboard</a>
        <a href="#" class="active">Browse Task</a>
        <a href="#">Post Task</a>
        <a href="#">My Tasks</a>
        <a href="#">Leaderboard</a>
    </nav>
</header>

<main class="main-container">

    <h1 class="page-title">Browse Tasks</h1>

    <div class="task-container">

        <div class="task-card">
            <h3>Belikan Makanan</h3>
            <p>Need someone to buy food from Cafe Satria.</p>
            <p class="reward">Reward: RM10</p>
            <button>View Details</button>
        </div>

        <div class="task-card">
            <h3>Print Lecture Notes</h3>
            <p>Need notes printed before class.</p>
            <p class="reward">Reward: RM7</p>
            <button>View Details</button>
        </div>

        <div class="task-card">
            <h3>Library Book Return</h3>
            <p>Return borrowed books to library.</p>
            <p class="reward">Reward: RM5</p>
            <button>View Details</button>
        </div>

    </div>

</main>

</body>
</html>
