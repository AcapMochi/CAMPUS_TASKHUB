<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">

<head>
    <title>Campus TaskHub - Browse Tasks</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/browseTask.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html" class="active">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic">
            </a>
        </div>
    </header>

    <main class="main-container">
        <h1 class="page-title">Browse Tasks</h1>

        <div class="browse-layout">
            <!-- Filter Sidebar -->
            <aside class="filter-sidebar">
                <h2>Filters</h2>

                <div class="filter-section">
                    <h3>Location</h3>
                    <div class="tag-group" id="location-tags">
                        <button class="tag active" data-value="All">All</button>
                        <button class="tag" data-value="FTMK">FTMK</button>
                        <button class="tag" data-value="FAIX">FAIX</button>
                        <button class="tag" data-value="FTKM">FTKM</button>
                        <button class="tag" data-value="FKE">FKE</button>
                        <button class="tag" data-value="FTKEK">FTKEK</button>
                        <button class="tag" data-value="FPTT">FPTT</button>
                        <button class="tag" data-value="Satria">Satria</button>
                        <button class="tag" data-value="Jebat">Jebat</button>
                        <button class="tag" data-value="Lekir">Lekir</button>
                        <button class="tag" data-value="Kasturi">Kasturi</button>
                        <button class="tag" data-value="Kafe Satria">Kafe Satria</button>
                    </div>
                </div>

                <div class="filter-section">
                    <h3>Category</h3>
                    <div class="tag-group" id="category-tags">
                        <button class="tag active" data-value="All">All</button>
                        <button class="tag" data-value="Food">Food</button>
                        <button class="tag" data-value="Printing">Printing</button>
                        <button class="tag" data-value="Library">Library</button>
                        <button class="tag" data-value="Assignment">Assignment</button>
                        <button class="tag" data-value="Supplies">Supplies</button>
                        <button class="tag" data-value="Tech">Tech</button>
                        <button class="tag" data-value="Sports">Sports</button>
                        <button class="tag" data-value="Grocery">Grocery</button>
                        <button class="tag" data-value="Car">Car</button>
                        <button class="tag" data-value="Room">Room</button>
                    </div>
                </div>

                <div class="filter-section">
                    <label>Min reward (RM)</label>
                    <input type="number" id="min-reward" placeholder="RM 0" class="reward-input">
                </div>

                <div class="filter-section">
                    <label>Max reward (RM)</label>
                    <input type="number" id="max-reward" placeholder="RM 50" class="reward-input">
                </div>

                <button id="apply-filters-btn" class="apply-filters-btn">Apply Filters</button>
            </aside>

            <div class="task-container" id="live-task-container">
                <p style="text-align: center; color: #888; grid-column: span 2;">Loading tasks...</p>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Initial fetch on page load
            fetchTasks();

            // 2. Setup Multi-Select Tags
            const setupMultiSelectTags = (groupId) => {
                const group = document.getElementById(groupId);
                const allBtn = group.querySelector('.tag[data-value="All"]');

                group.addEventListener('click', (e) => {
                    if (e.target.classList.contains('tag')) {
                        const clickedBtn = e.target;
                        const value = clickedBtn.getAttribute('data-value');

                        if (value === 'All') {
                            // If "All" is clicked, turn it on and turn everything else off
                            group.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                            clickedBtn.classList.add('active');
                        } else {
                            // Toggle the clicked button on/off
                            clickedBtn.classList.toggle('active');

                            // Turn off the "All" button since a specific filter was chosen
                            if (allBtn) allBtn.classList.remove('active');

                            // If nothing is selected after toggling, turn "All" back on
                            const activeTags = group.querySelectorAll('.tag.active');
                            if (activeTags.length === 0 && allBtn) {
                                allBtn.classList.add('active');
                            }
                        }
                    }
                });
            };

            setupMultiSelectTags('location-tags');
            setupMultiSelectTags('category-tags');

            // 3. Listen for the Apply Filters button
            document.getElementById('apply-filters-btn').addEventListener('click', function () {
                fetchTasks();
            });
        });

        function fetchTasks() {
            const container = document.getElementById('live-task-container');
            container.innerHTML = '<p style="text-align: center; color: #888; grid-column: span 2;">Loading tasks...</p>';

            // Helper function to get all selected values as a comma-separated string
            const getActiveValues = (groupId) => {
                const activeTags = document.querySelectorAll(`#${groupId} .tag.active`);
                const values = Array.from(activeTags).map(t => t.getAttribute('data-value'));

                // If "All" is selected, or nothing is selected, return null so we don't filter it
                if (values.includes('All') || values.length === 0) return null;
                return values.join(','); // Example: "FTMK,FKE"
            };

            const locations = getActiveValues('location-tags');
            const categories = getActiveValues('category-tags');
            const minReward = document.getElementById('min-reward').value;
            const maxReward = document.getElementById('max-reward').value;

            // Build the URL
            let url = new URL('includes/php/get_tasks.php', window.location.href);
            if (locations) url.searchParams.append('locations', locations);
            if (categories) url.searchParams.append('categories', categories);
            if (minReward) url.searchParams.append('min', minReward);
            if (maxReward) url.searchParams.append('max', maxReward);

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = '';

                    if (data.status === 'success') {
                        if (data.tasks.length === 0) {
                            container.innerHTML = '<p style="text-align: center; color: #888; grid-column: span 2;">No tasks found matching your filters.</p>';
                            return;
                        }

                        data.tasks.forEach(task => {
                            const card = document.createElement('div');
                            card.className = 'task-card';
                            card.innerHTML = `
                            <h3>${task.Title}</h3>
                            <p style="color: #bbb; font-size: 0.9em;">Posted by: ${task.Username}</p>
                            <p>${task.Description}</p>
                            <p style="color: #00ff88; font-size: 0.9em;">📍 ${task.Location} | 🏷️ ${task.CategoryName}</p>
                            <p class="reward">Reward: RM${task['Reward_Amount']}</p>
                            <button onclick="window.location.href='taskDetail.html?id=${task.TaskID}'">View Details</button>
                        `;
                            container.appendChild(card);
                        });
                    } else {
                        console.error("Backend error:", data.message);
                        container.innerHTML = `<p style="color: #ff4d4d; grid-column: span 2;">Error: ${data.message}</p>`;
                    }
                })
                .catch(error => {
                    console.error("Fetch error:", error);
                    container.innerHTML = '<p style="color: #ff4d4d; grid-column: span 2;">Network error. Check console and make sure paths are correct.</p>';
                });
        }
    </script>

</body>

</html>
