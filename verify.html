<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account | Campus TaskHub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">

    <main class="auth-container">
        
        <div class="auth-header">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
            </a>
            <p class="auth-subtitle">We sent a 6-digit code to your student email. Enter it below to verify your account.</p>
        </div>

        <div class="auth-card">
            <form action="includes/php/verify_handler.php" method="POST">
                
                <div class="field-block" style="text-align: center;">
                    <label>Verification Code</label>
                    <input type="text" name="otp_code" class="form-input" placeholder="000000" maxlength="6" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px; font-weight: bold;" required>
                </div>

                <button type="submit" class="btn-primary-full" style="margin-top: 15px;">Verify & Continue</button>
            </form>

            <div class="auth-footer">
                <p>Didn't receive the email? <a href="#" class="register-link">Resend Code</a></p>
            </div>
        </div>

    </main>

</body>
</html>
