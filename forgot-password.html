<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Campus TaskHub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">

    <main class="auth-container">
        
        <div class="auth-header">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
            </a>
            <p class="auth-subtitle">Direct Password Recovery System</p>
        </div>

        <div class="auth-card">
            <form action="includes/php/forgot_process.php" method="POST">
                
                <div class="field-block">
                    <label>Student Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="e.g. d032410118@student.utem.edu.my" required>
                </div>

                <div class="field-block" style="margin-top: 15px;">
                    <label>New Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Enter your new password" required>
                </div>

                <div class="field-block" style="margin-top: 15px;">
                    <label>Confirm New Password</label>
                    <input type="password" name="password_confirmation" class="form-input" placeholder="Repeat your new password" required>
                </div>

                <button type="submit" class="btn-primary-full" style="margin-top: 25px;">Update Password Instantly</button>
            </form>

            <div class="auth-footer">
                <p>Remembered your password? <a href="login.html" class="register-link">Log in here</a></p>
            </div>
        </div>

    </main>

</body>
</html>
