<!DOCTYPE html>

<head>
    <title>SIGN IN</title>
    <link rel="stylesheet" href="/CAMPUS_TASKHUB/css/login.css" />
</head>

<body>
    <nav class="top-menu">
        <span class="campus">CAMPUS</span>
        <span class="taskhub">TASKHUB</span>
    </nav>

    <main class="container">
        <section class="login-form">
            <h1 class="login">LOGIN</h1>

            <label class="label">Username:</label>
            <input class="input" type="text", placeholder="e.g: campustaskhub123">

            <label class="label">Password:</label>
            <input class="input" type="password", placeholder="e.g: taskhub@27">

            <button class="button" type="submit">LOGIN</button>
            <h4 class="signup"><a href="/CAMPUS_TASKHUB/signup.html">No account yet? sign up here.</a></h4>
        </section>
    </main>
</body>

</html>
