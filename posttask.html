<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Tasks</title>
<link rel="stylesheet" href="posttask.css">
</head>

<body>

<header class="navbar">
    <div class="logo">CAMPUS <span>TASKHUB</span></div>

    <nav>
        <a href="#">Dashboard</a>
        <a href="#">Browse Task</a>
        <a class="active" href="#">Post Task</a>
        <a href="#">My Tasks</a>
        <a href="#">Leaderboard</a>
    </nav>

    <div class="profile">
        <a href="#" class="msg">💬</a>
        <img src="https://i.pravatar.cc/40">
    </div>
</header>

<section class="container">
<h1>Post Tasks</h1>

<div class="card">

<form id="posttaskForm">

<!-- ROW 1 -->
<div class="row">
    <div class="group">
        <label>Task Title</label>
        <input type="text" id="posttaskTitle" placeholder="e.g Buy food from Kafe Satria">
    </div>

    <div class="group">
        <label>Category</label>
        <select id="posttaskCategory">
            <option>Select Category</option>
            <option>Food</option>
            <option>Delivery</option>
        </select>
    </div>
</div>

<!-- DESCRIPTION -->
<div class="group">
    <label>Description</label>
    <textarea id="posttaskDesc"
    placeholder="Describe what needs to be done in detail..."></textarea>
</div>

<!-- ROW 2 -->
<div class="row">
    <div class="group">
        <label>Location</label>
        <input type="text" placeholder="Select Location">
    </div>

    <div class="group">
        <label>Specific location (optional)</label>
        <input type="text" placeholder="e.g Blok C">
    </div>
</div>

<!-- ROW 3 -->
<div class="row align">
    <div class="group">
        <label>Reward amount (RM)</label>
        <input type="number" placeholder="RM 0.00">
    </div>

    <!-- UPLOAD -->
    <div class="upload-box" onclick="posttaskUploadFile()">
        <div class="upload-inner">
            <span id="posttaskText">＋</span>
            <p>Drag and drop or click to add attachment</p>
            <img id="posttaskPreview">
        </div>
    </div>
</div>

<input type="file" id="posttaskFile" hidden>

<!-- GUIDELINE -->
<div class="guideline">
    <strong>Community guidelines</strong><br>
    Only post tasks that are safe, legal, and campus-appropriate.
</div>

<!-- BUTTON -->
<div class="buttons">
    <button type="button" class="draft">Save as draft</button>
    <button type="submit" class="continue">Continue</button>
</div>

</form>
</div>
</section>

<script src="posttask.js"></script>
</body>
</html>
