<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details | Campus TaskHub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/taskprogressposter.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>
    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </a>
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html" class="active">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>
        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" class="profile-pic" onerror="this.src='images/PFP.jpg'">
            </a>
        </div>
    </header>

    <main class="page-main">
        <div class="page-header">
            <a href="browseTask.html" class="back-link">← Back to Browse</a>
            <h1 class="page-title">Task Details</h1>
        </div>

        <button class="btn-report" onclick="openReportModal()"
            style="background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">🚩
            Report Issue</button>

        <div class="content" id="taskContent">
            <p style="text-align: center; color: #6c637e;">Loading...</p>
        </div>

        <div class="modal-overlay" id="reportModal"
            style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; z-index: 1000;">
            <div class="modal-card"
                style="background: #0d0910; border: 1px solid #2f2235; border-radius: 12px; width: 100%; max-width: 500px; padding: 30px;">
                <div class="modal-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color: #ffffff; margin: 0;">Report Task Issue</h2>
                    <button class="close-btn" onclick="closeReportModal()"
                        style="background: transparent; border: none; color: #948b9c; font-size: 1.5rem; cursor: pointer;">×</button>
                </div>
                <div class="modal-body">
                    <p style="color: #948b9c; margin-bottom: 20px; font-size: 0.9rem;">What went wrong with this task?
                    </p>
                    <textarea id="report-desc" class="form-input" rows="4" placeholder="Please provide details..."
                        style="width: 100%; background: #140a15; border: 1px solid #42355c; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; resize: vertical;"></textarea>
                </div>
                <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 15px;">
                    <button class="btn-outline" onclick="closeReportModal()"
                        style="background: transparent; border: 1px solid #42355c; color: #ffffff; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Cancel</button>
                    <button class="btn-report-submit" onclick="submitTaskReport()"
                        style="background: #ff4d4d; border: none; color: #ffffff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Submit
                        Report</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('id');
            const contentDiv = document.getElementById('taskContent');

            if (!taskId) {
                contentDiv.innerHTML = "<p style='color: #ff4d4d;'>Error: No task specified.</p>";
                return;
            }

            fetch(`includes/php/get_tasks.php`)
                .then(res => res.json())
                .then(data => {
                    if (data.status !== 'success') throw new Error(data.message);

                    const task = data.tasks.find(t => t.TaskID == taskId);

                    if (!task) {
                        contentDiv.innerHTML = "<p style='color: #ff4d4d;'>Task not found or is no longer available.</p>";
                        return;
                    }

                    // 1. REWARD MATH (Supply Cost + Service Fee)
                    const baseReward = parseFloat(task.Reward_Amount) || 0;
                    const serviceFee = 2.00; // Change this if your fee is different
                    const totalCost = baseReward + serviceFee;

                    // 2. SMART PATH FOR ATTACHMENTS 
                    // If your DB just stores "image.jpg", we tell it to look in the uploads folder.
                    // IMPORTANT: Change 'includes/uploads/' to wherever your system actually saves files!
                    let attachmentHtml = "";
                    if (task.Attachment_URL && task.Attachment_URL.trim() !== '') {
                        let safeAttachmentPath = task.Attachment_URL;

                        // If it doesn't have a slash or http, it's just a filename. Add the folder path.
                        if (!safeAttachmentPath.includes('/') && !safeAttachmentPath.startsWith('http')) {
                            safeAttachmentPath = 'includes/uploads/' + safeAttachmentPath;
                        }

                        attachmentHtml = `
                        <div style="margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid var(--border-light);">
                            <p class="section-label" style="font-size: 0.8rem; margin-bottom: 10px; color: var(--text-main); font-weight: bold;">Reference Attachment</p>
                            <img src="${safeAttachmentPath}" 
                                 style="max-width: 100%; border-radius: 8px; border: 1px solid #eaeff2; display: block;" 
                                 alt="Task Attachment"
                                 onerror="this.style.display='none'; alert('Attachment found in DB, but the image file is missing from the folder!');">
                        </div>`;
                    }

                    // 3. SMART PATH FOR PROFILE PICTURES
                    let safePosterPic = task.PosterPic;
                    if (safePosterPic && !safePosterPic.includes('/') && !safePosterPic.startsWith('http')) {
                        safePosterPic = 'images/' + safePosterPic; // Adjust if your PFPs are stored elsewhere
                    } else if (!safePosterPic) {
                        safePosterPic = 'images/PFP.jpg'; // Fallback
                    }

                    // 4. RENDER HTML
                    contentDiv.innerHTML = `
                        <section class="card task-card">
                            <div class="task-card-top">
                                <span class="badge badge-teal">${task.CategoryName || 'General'}</span>
                                <span class="badge badge-progress">${task.Location || 'Campus'}</span>
                            </div>
                            <h2 class="task-title" style="margin-top: 15px;">${task.Title}</h2>
                            <p class="task-desc">${task.Description || 'No description provided.'}</p>
                            
                            ${attachmentHtml}
                            
                            <hr class="card-divider" />
                            
                            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                <div>
                                    <p class="reward-line" style="margin: 0; font-size: 1.2rem; color: var(--text-main);">
                                        Total Reward: <span class="reward-amount" style="color: var(--accent); font-weight: bold;">RM ${totalCost.toFixed(2)}</span>
                                    </p>
                                    <p style="margin: 4px 0 0 0; font-size: 0.8rem; color: var(--text-muted);">
                                        (Base: RM ${baseReward.toFixed(2)} + Service Fee: RM ${serviceFee.toFixed(2)})
                                    </p>
                                </div>
                                
                                <a href="userProfile.html?id=${task.PosterID || ''}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit;" ${task.PosterID ? '' : 'onclick="event.preventDefault();"'}>
                                    <img src="${safePosterPic}" 
                                         style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-light);" 
                                         onerror="this.src='images/PFP.jpg'">
                                    <p style="color: var(--text-muted); margin: 0; font-size: 0.9rem;">Posted by:<br><strong style="color: var(--text-main);">${task.PosterName || 'User'}</strong></p>
                                </a>
                            </div>
                        </section>

                        <div style="margin-top: 20px;">
                            <textarea id="applyMessage" placeholder="Leave a message for the poster..." style="width: 100%; padding: 15px; border-radius: 8px; background: #ffffff; border: 1px solid var(--border-light); color: var(--text-main); margin-bottom: 15px; min-height: 80px;"></textarea>
                            
                            <button onclick="applyForTask(${taskId})" style="width: 100%; background: var(--accent); color: #fff; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: background 0.2s;">
                                Apply for this Task
                            </button>
                        </div>
                    `;
                })
                .catch(err => {
                    contentDiv.innerHTML = `<p style='color: #ff4d4d;'>Failed to load task. Ensure your database is connected.</p>`;
                    console.error(err);
                });
        });

        function applyForTask(taskId) {
            const message = document.getElementById('applyMessage').value;

            fetch('includes/php/apply_task.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `task_id=${taskId}&message=${encodeURIComponent(message)}`
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert("Application sent! The poster will review your request.");
                        window.location.href = 'mytasks.html';
                    } else {
                        alert(data.message);
                    }
                })
                .catch(err => alert("Something went wrong."));
        }

        function openReportModal() {
            document.getElementById('reportModal').style.display = 'flex';
        }

        function closeReportModal() {
            document.getElementById('reportModal').style.display = 'none';
            document.getElementById('report-desc').value = '';
        }

        function submitTaskReport() {
            const urlParams = new URLSearchParams(window.location.search);
            const currentTaskId = urlParams.get('id');
            const desc = document.getElementById('report-desc').value.trim();

            if (!desc) {
                alert("Please provide some details for the report.");
                return;
            }

            const btn = document.querySelector('.btn-report-submit');
            btn.textContent = "Submitting...";
            btn.disabled = true;

            fetch('includes/php/submit_report.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    task_id: currentTaskId,
                    reason: desc
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert("Report submitted successfully. Our team will review this task.");
                        closeReportModal();
                    } else {
                        alert("Error: " + data.message);
                    }
                    btn.textContent = "Submit Report";
                    btn.disabled = false;
                })
                .catch(err => {
                    alert("Network error. Please try again.");
                    btn.textContent = "Submit Report";
                    btn.disabled = false;
                });
        }
    </script>
</body>

</html>
