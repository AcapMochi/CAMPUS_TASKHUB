<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus TaskHub - Task Details</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/taskDetail.css">
</head>

<body>
    <header class="navbar">
        <div class="logo"><span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span></div>
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>
        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html"><img src="images/PFP.jpg" alt="Profile" class="profile-pic" onerror="this.src='images/pfp1.jpg'"></a>
        </div>
    </header>

    <main class="main-container">
        <a href="browseTask.html" class="back-link">← Browse Tasks</a>
        
        <div id="task-detail-container">
            <p style="color: #888;">Loading task details...</p>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('id');

            if (!taskId) {
                document.getElementById('task-detail-container').innerHTML = "<p>No task selected.</p>";
                return;
            }

            // 1. Fetch Task Details
            fetch('includes/php/get_task_details.php?id=' + taskId)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        const t = data.task;
                        
                        // Set up fallbacks for variables that might not exist in your DB yet
                        const posterName = t.PosterName || t.Username || t.PosterID || "Unknown User";
                        const taskDesc = t.Description || "No description provided.";
                        const taskCategory = t.CategoryName || t.Category || "General";
                        const taskLocation = t.Location || "Campus";
                        const reward = parseFloat(t.Reward_Amount).toFixed(0); // Using 0 decimals to match RM10 prototype
                        const taskStatus = t.Status || "Open";
                        
                        // Placeholder image logic
                        const attachmentImg = t.Image_URL ? t.Image_URL : 'https://i.imgflip.com/6yvze5.jpg'; // Funny dog placeholder

                        // 2. Inject HTML dynamically matching the prototype
                        document.getElementById('task-detail-container').innerHTML = `
                            <div class="task-card">
                                <div class="user-info-row">
                                    <div class="avatar-wrapper">
                                        <img src="images/PFP.jpg" alt="Poster Avatar" class="user-avatar">
                                        <span class="online-dot"></span>
                                    </div>
                                    <div class="user-details">
                                        <div class="user-name">${posterName}</div>
                                        <div class="user-rating">4.8 ⭐</div>
                                    </div>
                                </div>

                                <div class="title-row">
                                    <h2 class="task-title">${t.Title}</h2>
                                    <div class="action-buttons">
                                        <button class="btn-report">Report</button>
                                        <button id="accept-btn" class="btn-accept">Accept</button>
                                    </div>
                                </div>

                                <p class="task-description">${taskDesc}</p>

                                <h3 class="section-title">Tags</h3>
                                <div class="tags-container">
                                    <span class="tag tag-status">${taskStatus}</span>
                                    <span class="tag tag-category">${taskCategory}</span>
                                    <span class="tag tag-location">${taskLocation}</span>
                                </div>

                                <h3 class="section-title">Attachment</h3>
                                <div class="attachment-container">
                                    <img src="${attachmentImg}" alt="Task Attachment" class="task-image">
                                </div>

                                <div class="footer-row">
                                    <div class="reward-text">Reward: <strong>RM${reward}</strong></div>
                                    <div class="time-text">22:34:50</div>
                                </div>
                            </div>
                        `;

                        // 3. Attach the event listener to the newly injected button
                        document.getElementById('accept-btn').addEventListener('click', function() {
                            acceptTask(taskId);
                        });

                    } else {
                        document.getElementById('task-detail-container').innerHTML = `<p>Error: ${data.message}</p>`;
                    }
                })
                .catch(err => {
                    console.error("Fetch failed:", err);
                    document.getElementById('task-detail-container').innerHTML = "<p>Failed to load task. Please check connection.</p>";
                });
        });

        function acceptTask(taskId) {
            if (!confirm("Are you sure you want to accept this task?")) return;

            fetch('includes/php/accept_task_handler.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_id: taskId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    alert("Task accepted!");
                    window.location.href = "mytasks.html";
                } else {
                    alert("Error: " + data.message);
                }
            });
        }
    </script>
</body>
</html>
