<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
    <link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/dashboard.css">
<script src="includes/js/auth.js"></script>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
    </div>

    <nav class="nav-links">
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="browseTask.html">Browse Tasks</a>
        <a href="posttasks.html">Post Task</a>
        <a href="mytasks.html">My Tasks</a>
        <a href="leaderboard.html">Leaderboard</a>
    </nav>

    <div class="header-icons">
        <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
        <a href="myProfile.html">
            <img src="images/PFP.jpg" alt="Profile" class="profile-pic">
        </a>
    </div>
</header>

<section class="container">

<h1 id="welcome-msg">Good morning</h1>

<!-- STATS -->
<div class="stats">

<div class="card">
    <h2 id="dashboard-open">0</h2>
    <p>Open Tasks</p>
</div>

<div class="card">
    <h2 id="dashboard-posted">0</h2>
    <p>Tasks Posted</p>
</div>

<div class="card highlight">
    <h2 id="dashboard-earned">RM 0</h2>
    <p>Your Total Earned</p>
</div>

<div class="card">
    <h2 id="dashboard-done">0</h2>
    <p>Completed</p>
</div>

</div>

<!-- GRID -->
<div class="grid">

<!-- LEFT -->
<div class="column">
<h3>Tasks you may like</h3>
<div id="taskList"></div>
</div>

<!-- RIGHT -->
<div class="column">

<h3>Your activity</h3>

<p>Tasks completed</p>
<div class="bar">
    <div id="barCompleted" class="fill"></div>
</div>

<p>Tasks posted</p>
<div class="bar">
    <div id="barPosted" class="fill blue"></div>
</div>

<h3>Recent activity</h3>
<div id="recent"></div>

</div>

</div>

</section>

<script src="includes/js/dashboard.js"></script>
</body>
</html>
