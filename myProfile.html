<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Campus TaskHub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/myProfile.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>

    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </a>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html" class="active">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic" id="nav-profile-pic" onerror="this.src='images/PFP.jpg'">
            </a>
        </div>
    </header>

    <main class="main-container">

        <div class="title-row">
            <h1 class="page-title">My Profile</h1>
            <div class="header-action-buttons">
                <button class="btn-outline" onclick="window.location.href='profile.html'">Settings</button>
                <button class="btn-outline btn-logout" onclick="window.location.href='includes/php/logout.php'">Logout</button>
            </div>
        </div>

        <div class="profile-grid">

            <div class="left-column">

                <div class="card profile-header-card">
                    <div class="avatar-wrapper">
                        <img src="images/PFP.jpg" class="user-image" id="profile-avatar" alt="Profile Image" onerror="this.src='images/PFP.jpg'">
                        <span class="online-dot"></span>
                    </div>
                    <div class="user-basic-info">
                        <h2 class="user-name" id="user-name">&nbsp;</h2>
                        <p class="user-email" id="user-email">&nbsp;</p>
                        <span id="verified-badge" class="badge" style="display: none;"></span>
                    </div>
                </div>

                <div class="card">
                    <h3 class="section-title">Contact Info</h3>
                    
                    <div class="info-group">
                        <p class="label">Full Name</p>
                        <p class="info-text" id="info-fullname">&nbsp;</p>
                    </div>
                    
                    <div class="info-group">
                        <p class="label">Phone Number</p>
                        <p class="info-text" id="info-phone">&nbsp;</p>
                    </div>
                    
                    <div class="info-group">
                        <p class="label">Faculty</p>
                        <p class="info-text" id="info-faculty">&nbsp;</p>
                    </div>
                </div>

            </div>

            <div class="right-column">

                <div class="card" id="reviews-container">
                    <h3 class="section-title">Recent Reviews Received</h3>
                    </div>

                <div class="card">
                    <h3 class="section-title">Account Security</h3>

                    <div class="security-row">
                        <p class="security-label">Email Verified</p>
                        <span id="sec-email" class="badge" style="display: none;"></span>
                    </div>
                    
                    <div class="line"></div>
                    
                    <div class="security-row">
                        <p class="security-label">Two-Factor Authentication</p>
                        <span id="sec-2fa" class="badge" style="display: none;"></span>
                    </div>
                </div>

            </div>

        </div>

    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch('includes/php/get_profile.php')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const user = data.user;

                        // 1. Inject User Info
                        document.getElementById('user-name').textContent = user.FullName || user.Username;
                        document.getElementById('user-email').textContent = user.Email;
                        
                        const pfpUrl = user['Profile_Pic_URL'] || 'images/PFP.jpg';
                        document.getElementById('profile-avatar').src = pfpUrl;
                        document.getElementById('nav-profile-pic').src = pfpUrl; // Update navbar pic too

                        // 2. Verified Badge logic
                        const verifiedBadge = document.getElementById('verified-badge');
                        const secEmail = document.getElementById('sec-email');

                        verifiedBadge.style.display = 'inline-block';
                        secEmail.style.display = 'inline-block';

                        if (user['Is_Verified'] == 1) {
                            verifiedBadge.textContent = 'Verified member';
                            verifiedBadge.className = 'badge badge-verified';

                            secEmail.textContent = 'Active';
                            secEmail.className = 'badge badge-active';
                        } else {
                            verifiedBadge.textContent = 'Unverified member';
                            verifiedBadge.className = 'badge badge-unverified';

                            secEmail.textContent = 'Pending';
                            secEmail.className = 'badge badge-off';
                        }

                        // 3. 2FA Logic
                        const sec2FA = document.getElementById('sec-2fa');
                        sec2FA.style.display = 'inline-block';
                        
                        if (user['Two_Factor_Enabled'] == 1) {
                            sec2FA.textContent = 'On';
                            sec2FA.className = 'badge badge-active';
                        } else {
                            sec2FA.textContent = 'Off';
                            sec2FA.className = 'badge badge-off';
                        }

                        // 4. Inject Contact Info
                        document.getElementById('info-fullname').textContent = user.FullName || "Not set";
                        document.getElementById('info-phone').textContent = user.Phone || "Not set";
                        document.getElementById('info-faculty').textContent = user.Faculty || "Not set";

                        // 5. Inject Reviews
                        const reviewsContainer = document.getElementById('reviews-container');
                        
                        if (data.reviews && data.reviews.length > 0) {
                            data.reviews.forEach((rev, index) => {
                                let stars = '⭐'.repeat(rev.Rating);
                                let divider = index !== data.reviews.length - 1 ? '<div class="line"></div>' : '';

                                reviewsContainer.innerHTML += `
                                    <div class="review-item">
                                        <div class="review-top">
                                            <img src="${rev.ReviewerPic || 'images/PFP.jpg'}" class="review-pic" onerror="this.src='images/PFP.jpg'">
                                            <span class="review-name">${rev.ReviewerName} <span class="stars">${stars}</span></span>
                                        </div>
                                        <p class="review-text">"${rev.Comment}"</p>
                                    </div>
                                    ${divider}
                                `;
                            });
                        } else {
                            reviewsContainer.innerHTML += '<p class="empty-state">No reviews yet.</p>';
                        }
                    } else {
                        console.error("Failed to fetch profile: ", data.message);
                    }
                })
                .catch(error => {
                    console.error("Network error fetching profile:", error);
                });
        });
    </script>

</body>
</html>
