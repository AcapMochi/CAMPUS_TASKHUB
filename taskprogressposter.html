<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Task | Campus TaskHub</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/taskprogressposter.css" />
  <script src="includes/js/auth.js"></script>
</head>

<body>
  <header class="navbar">
    <a href="index.html" class="logo" style="text-decoration: none;">
      <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
    </a>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="browseTask.html">Browse Tasks</a>
      <a href="posttasks.html">Post Task</a>
      <a href="mytasks.html" class="active">My Tasks</a>
      <a href="leaderboard.html">Leaderboard</a>
    </nav>
    <div class="header-icons">
      <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
      <a href="myProfile.html">
        <img src="images/PFP.jpg" alt="Profile" class="profile-pic" onerror="this.src='images/PFP.jpg'">
      </a>
    </div>
  </header>

  <main class="page-main">
    <div class="page-header">
      <a href="mytasks.html" class="back-link">← My Tasks</a>
      <h1 class="page-title">Manage Task</h1>
    </div>
    <hr class="page-divider" />

    <div class="content" id="main-content">
      <p style="text-align: center; color: #6c637e; margin-top: 50px;">Loading Task Data...</p>
    </div>

    <div class="modal-overlay" id="reportModal"
      style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); align-items: center; justify-content: center; z-index: 1000;">
      <div
        style="background: #0d0910; border: 1px solid #2f2235; border-radius: 12px; width: 100%; max-width: 500px; padding: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h2 style="color: #ffffff; margin: 0;">Report Task Issue</h2>
          <button onclick="closeReportModal()"
            style="background: transparent; border: none; color: #948b9c; font-size: 1.5rem; cursor: pointer;">×</button>
        </div>

        <p style="color: #948b9c; margin-bottom: 20px; font-size: 0.9rem;">What went wrong with this task? Our admins
          will review this transaction and chat logs.</p>

        <textarea id="report-reason" rows="5" placeholder="Provide full details of the issue..."
          style="width: 100%; background: #140a15; border: 1px solid #42355c; color: white; padding: 12px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; resize: vertical;"></textarea>

        <div style="display: flex; justify-content: flex-end; gap: 15px;">
          <button onclick="closeReportModal()"
            style="background: transparent; border: 1px solid #42355c; color: #ffffff; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Cancel</button>
          <button id="btn-submit-report" onclick="submitTaskReport()"
            style="background: #ff4d4d; border: none; color: #ffffff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">Submit
            Report</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const taskId = urlParams.get('id');
      const mainContent = document.getElementById('main-content');

      if (!taskId) {
        mainContent.innerHTML = "<p style='color: #ff4d4d;'>Error: No Task ID provided.</p>";
        return;
      }

      // Fetch the specific task data AND its applicants
      fetch(`includes/php/get_task_details.php?id=${taskId}`)
        .then(res => res.json())
        .then(data => {
          if (data.status !== 'success') {
            mainContent.innerHTML = `<p style='color: #ff4d4d;'>Error: ${data.message}</p>`;
            return;
          }

          const task = data.task;
          const applicants = data.applicants || []; // Assuming your PHP will return a list of users who applied

          const status = task.Status ? task.Status.toLowerCase() : "open";
          const reward = parseFloat(task.Reward_Amount).toFixed(0);

          // ==========================================
          // STATE 1: THE SELECTION PHASE (Open/Pending)
          // ==========================================
          if (status === 'open' || status === 'pending') {

            let applicantsHTML = "";

            if (applicants.length > 0) {
              // Generate the list of runners who applied
              applicantsHTML = applicants.map(app => {
                const rating = app.Rating || "New Runner";
                return `
      <div class="applicant-row">
          <div class="runner-info">
              <img src="${app.Profile_Pic_URL || 'images/PFP.jpg'}" 
                   class="runner-avatar" 
                   onclick="window.location.href='userProfile.html?id=${app.UserID}'" 
                   style="cursor: pointer; border: 2px solid transparent; transition: border 0.2s;" 
                   onmouseover="this.style.borderColor='#00ffa6'" 
                   onmouseout="this.style.borderColor='transparent'"
                   title="View Profile">
              
              <div class="runner-meta">
                  <p class="runner-name">${app.Username}</p>
                  <p class="runner-rating">${rating} ⭐</p>
              </div>
          </div>
          <button class="btn-accept-runner" onclick="acceptRunner(${taskId}, ${app.UserID})">Accept Runner</button>
      </div>
  `;
              }).join('');
              // STATE 2: THE PROGRESS PHASE (Accepted/In Progress)
            } else {
              const runnerName = task.RunnerName || "Assigned Runner";
              // Grab the runner's actual picture from the database (fallback to default)
              const runnerPic = task.RunnerPic || "images/PFP.jpg";

              mainContent.innerHTML = `
        <section class="card task-card">
            </section>

        <section class="card runner-card">
            <p class="section-label">Your Runner</p>

            <div class="runner-row">
                <div class="runner-info">
                    <div class="runner-avatar-wrapper">
                        <img src="${runnerPic}" 
                             class="runner-avatar" 
                             onclick="window.location.href='userProfile.html?id=${task.RunnerID}'" 
                             style="cursor: pointer; border: 2px solid transparent; transition: border 0.2s;"
                             onmouseover="this.style.borderColor='#00ffa6'" 
                             onmouseout="this.style.borderColor='transparent'"
                             title="View Profile"
                             onerror="this.src='images/PFP.jpg'">
                        <span class="online-dot"></span>
                    </div>
                    <div class="runner-meta">
                        <p class="runner-name">${runnerName}</p>
                        <p class="runner-rating">4.8 ⭐</p>
                    </div>
                </div>
                <button class="btn-chat" onclick="window.location.href='chatpage.html'">Message</button>
            </div>
        </section>

        `;
            }

            // Render the Application View
            mainContent.innerHTML = `
                            <section class="card task-card">
                                <div class="task-card-top">
                                    <span class="badge badge-teal">${task.CategoryName || 'General'}</span>
                                    <span class="badge badge-open">Waiting for Runners</span>
                                </div>
                                <h2 class="task-title">${task.Title}</h2>
                                <p class="task-desc">${task.Description}</p>
                                <hr class="card-divider" />
                                <p class="reward-line">Reward: <span class="reward-amount">RM${reward}</span></p>
                            </section>

                            <section class="card progress-card">
                                <p class="section-label">Applicants (${applicants.length})</p>
                                <p style="color: #948b9c; font-size: 0.9rem; margin-bottom: 20px;">Review the profiles below and select the runner you trust.</p>
                                
                                <div class="applicants-list">
                                    ${applicantsHTML}
                                </div>
                            </section>
                            
                            <div class="action-buttons">
                                <button class="btn-cancel" onclick="cancelTask(${taskId})">Cancel Task</button>
                            </div>
                        `;

            // ==========================================
            // STATE 2: THE PROGRESS PHASE (Accepted/In Progress)
            // ==========================================
          } else {
            // A runner has been chosen! Show the tracking UI.
            const runnerName = task.RunnerName || "Assigned Runner";

            mainContent.innerHTML = `
                            <section class="card task-card">
                                <div class="task-card-top">
                                    <span class="badge badge-teal">${task.CategoryName || 'General'}</span>
                                    <span class="badge badge-progress">In Progress</span>
                                </div>
                                <h2 class="task-title">${task.Title}</h2>
                                <p class="task-desc">${task.Description}</p>
                                <hr class="card-divider" />
                                <p class="reward-line">Reward: <span class="reward-amount">RM${reward}</span></p>
                            </section>

                            <section class="card runner-card">
                                <p class="section-label">Your Runner</p>

                                <div class="runner-row">
                                    <div class="runner-info">
                                        <div class="runner-avatar-wrapper">
                                            <img src="images/PFP.jpg" class="runner-avatar">
                                            <span class="online-dot"></span>
                                        </div>
                                        <div class="runner-meta">
                                            <p class="runner-name">${runnerName}</p>
                                            <p class="runner-rating">4.8 ⭐</p>
                                        </div>
                                    </div>
                                    <button class="btn-chat" onclick="window.location.href='chatpage.html'">Message</button>
                                </div>
                            </section>

                            <div class="action-buttons">
                                <button class="btn-cancel" onclick="reportIssue(${taskId})">Report Issue</button>
                                <button class="btn-complete" onclick="markComplete(${taskId})">Confirm Delivery & Pay</button>
                            </div>
                        `;
          }
        })
        .catch(err => {
          console.error("Fetch Error:", err);
          mainContent.innerHTML = "<p style='color: #ff4d4d;'>Error loading task details.</p>";
        });
    });

    function acceptRunner(taskId, runnerId) {
      if (confirm("You will be redirected to review your payment details before checking out. Continue?")) {

        // Disable button to prevent double-clicks
        event.target.disabled = true;
        event.target.innerText = "Processing...";

        // Point this to your newly updated payment.html intermediary page
        window.location.href = `payment.html?task_id=${taskId}&runner_id=${runnerId}`;
      }
    }

    function cancelTask(taskId) {
      if (confirm("Are you sure you want to cancel this task? It will be removed from the open listings.")) {

        // Send request to the backend to update the database
        fetch('includes/php/cancel_task.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `task_id=${taskId}`
        })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'success') {
              alert("Task canceled successfully.");
              window.location.href = 'mytasks.html'; // Send them back to their tasks list
            } else {
              alert("Error: " + data.message);
            }
          })
          .catch(err => {
            console.error("Fetch Error:", err);
            alert("A network error occurred. Please try again.");
          });
      }
    }

    let posterPollingInterval;

    // --- ADD THIS TO YOUR DOMContentLoaded BLOCK ---
    // Start checking the task status every 3 seconds
    document.addEventListener("DOMContentLoaded", function () {
      // ... your existing code to grab URL params ...

      posterPollingInterval = setInterval(() => {
        checkLiveTaskStatus(taskId);
      }, 3000);
    });

    // --- NEW FUNCTION TO CHECK LIVE STATUS ---
    function checkLiveTaskStatus(taskId) {
      fetch(`includes/php/get_task_details.php?id=${taskId}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            const task = data.task;

            // If the task is completed (both clicked), jump to rating page!
            if (task.Status === 'Completed') {
              clearInterval(posterPollingInterval);
              window.location.href = `taskdoneposter.html?id=${taskId}`;
            }

            // If Poster already clicked, but waiting on Runner, update button UI
            if (task.Poster_Confirmed == 1 && task.Runner_Confirmed == 0) {
              const btn = document.querySelector('.btn-complete');
              if (btn) {
                btn.disabled = true;
                btn.innerText = "⏳ Waiting for Runner to confirm...";
                btn.style.backgroundColor = "#2f2235";
                btn.style.color = "#b0a7b8";
                btn.style.cursor = "not-allowed";
              }
            }
          }
        });
    }

    // --- UPDATED BUTTON CLICK FUNCTION ---
    function markComplete(taskId) {
      if (confirm("Confirm that the runner has successfully delivered? We will finalize payment once the runner also confirms.")) {

        const btn = document.querySelector('.btn-complete');
        btn.innerText = "Processing...";
        btn.disabled = true;

        fetch('includes/php/confirm_task_dual.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `task_id=${taskId}`
        })
          .then(res => res.json())
          .then(data => {
            if (data.status === 'success') {
              if (data.fully_completed) {
                // Runner already clicked earlier, so it's done immediately!
                window.location.href = `taskdoneposter.html?id=${taskId}`;
              } else {
                // Poster clicked first. Update UI to wait.
                btn.innerText = "⏳ Waiting for Runner to confirm...";
                btn.style.backgroundColor = "#2f2235";
                btn.style.color = "#b0a7b8";
                btn.style.cursor = "not-allowed";
              }
            } else {
              alert("Error: " + data.message);
              btn.disabled = false;
              btn.innerText = "Confirm Delivery & Pay";
            }
          });
      }
    }

    // --- REPORT ISSUE FUNCTIONS ---
    let reportTaskId = null;

    function reportIssue(taskId) {
      reportTaskId = taskId; // Store the ID for submission
      document.getElementById('reportModal').style.display = 'flex';
    }

    function closeReportModal() {
      document.getElementById('reportModal').style.display = 'none';
      document.getElementById('report-reason').value = ''; // Clear text
    }

    function submitTaskReport() {
      const reasonText = document.getElementById('report-reason').value.trim();

      if (!reasonText) {
        alert("Please provide details about the issue.");
        return;
      }

      const btn = document.getElementById('btn-submit-report');
      btn.textContent = "Submitting...";
      btn.disabled = true;

      fetch('includes/php/submit_report.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          task_id: reportTaskId,
          reason: reasonText
        })
      })
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            alert("Report submitted successfully. An admin will review this task.");
            closeReportModal();
          } else {
            alert("Error: " + data.message);
          }
          btn.textContent = "Submit Report";
          btn.disabled = false;
        })
        .catch(err => {
          console.error("Fetch Error:", err);
          alert("Network error. Please try again.");
          btn.textContent = "Submit Report";
          btn.disabled = false;
        });
    }
  </script>
</body>

</html>
