<!DOCTYPE html>
<html lang="en">
<head>
 
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus TaskHub - Task Done Runner</title>
    <link href="taskdonerunner.css" rel="stylesheet">
 
</head>
<body>
 
    <main>
        <div class="confetti">🎉</div>
 
        <div class = "done-title">
            <h1>Great Job!</h1>
            <p class="subtitle">Task marked as done. Waiting for poster confirmation.</p>
        </div>
 
        <div class="amount-box">
            <p class="amount-label">Amount to be received</p>
            <span class="amount-value" id="taskPrice">RM 10.00</span>
            <p class="amount-note">Released after poster confirms</p>
        </div>
 
        <div class="detail-box">
            <div class="detail-row">
                <span class="receipt-label">Task</span>
                <span class="receipt-value" id="taskName">Belikan Makanan</span>
            </div>
            <div class="detail-row">
                <span class="receipt-label">Posted by</span>
                <span class="receipt-value" id="taskRunner">Acap</span>
            </div>
            <div class="detail-row">
                <span class="receipt-label">Duration</span>
                <span class="receipt-value" id="taskDuration">18 mins</span>
            </div>
            <div class="detail-row">
                <span class="receipt-label">Your rating so far</span>
                <span class="receipt-value" id="taskRating">4</span>
            </div>
        </div>
 
        <button class="btn-submit" id="browseMoreBtn">Browse More Tasks</button>
    </main>
 
<script src="taskdonerunner.js"></script>
 
</body>
</html>
