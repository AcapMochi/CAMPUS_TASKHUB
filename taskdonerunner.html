<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus TaskHub - Task Done Runner</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/taskdonerunner.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>

    <header class="navbar">
        <div class="logo">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic" onerror="this.src='images/PFP.jpg'">
            </a>
        </div>
    </header>

    <main>
        <div class="confetti">🎉</div>

        <div class="done-title">
            <h1>Great Job!</h1>
            <p class="subtitle">Task marked as done. Waiting for poster confirmation.</p>
        </div>

        <div class="amount-box">
            <p class="amount-label">Amount to be received</p>
            <span class="amount-value" id="taskPrice">RM 10.00</span>
            <p class="amount-note">Released after poster confirms</p>
        </div>

        <div class="detail-box">
            <div class="detail-row">
                <span class="receipt-label">Task</span>
                <span class="receipt-value" id="taskName">Belikan Makanan</span>
            </div>
            <div class="detail-row">
                <span class="receipt-label">Posted by</span>
                <span class="receipt-value" id="taskRunner">Acap</span>
            </div>
            <div class="detail-row">
                <span class="receipt-label">Duration</span>
                <span class="receipt-value" id="taskDuration">18 mins</span>
            </div>
            <div class="detail-row">
                <span class="receipt-label">Your rating so far</span>
                <span class="receipt-value" id="taskRating">4</span>
            </div>
        </div>

        <button class="btn-submit" id="browseMoreBtn">Browse More Tasks</button>
    </main>

    <script src="includes/js/taskdonerunner.js"></script>

</body>

</html>
