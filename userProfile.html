<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | Campus TaskHub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/userProfile.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>

    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </a>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic" onerror="this.src='images/PFP.jpg'">
            </a>
        </div>
    </header>

    <main class="main-container">
        <button class="back-link" onclick="window.history.back()">← Back</button>

        <div class="profile-grid">
            
            <div class="left-column">
                <div class="card public-header-card">
                    <div class="avatar-wrapper-large">
                        <img src="images/PFP.jpg" id="pub-avatar" class="pub-image" onerror="this.src='images/PFP.jpg'">
                    </div>
                    <h1 class="pub-name" id="pub-username">Loading...</h1>
                    <p class="pub-fullname" id="pub-fullname"></p>
                    
                    <div class="pub-badges">
                        <span class="badge badge-verified" id="pub-verified" style="display: none;">Verified</span>
                        <span class="badge badge-faculty" id="pub-faculty">Faculty</span>
                    </div>

                    <div class="pub-stats">
                        <div class="stat-box">
                            <span class="stat-value" id="pub-rating">0.0</span>
                            <span class="stat-label">Rating ⭐</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="card">
                    <h3 class="section-title">About</h3>
                    <p class="pub-bio" id="pub-bio">Loading bio...</p>
                </div>

                <div class="card" id="pub-reviews-container">
                    <h3 class="section-title">Recent Reviews</h3>
                </div>
            </div>

        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUserId = urlParams.get('id');

        document.addEventListener("DOMContentLoaded", function () {
            if (!targetUserId) {
                document.querySelector('.profile-grid').innerHTML = "<h2 style='color: #ff4d4d;'>User not found.</h2>";
                return;
            }

            // Fetch public profile data
            fetch(`includes/php/get_public_profile.php?id=${targetUserId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        const user = data.user;
                        
                        document.getElementById('pub-username').textContent = user.Username;
                        document.getElementById('pub-fullname').textContent = user.FullName || "Campus TaskHub Member";
                        document.getElementById('pub-avatar').src = user.Profile_Pic_URL || 'images/PFP.jpg';
                        document.getElementById('pub-faculty').textContent = user.Faculty || "Student";
                        document.getElementById('pub-rating').textContent = parseFloat(user.Rating_Average).toFixed(1);
                        document.getElementById('pub-bio').textContent = user.Bio_Text || "This user hasn't added a bio yet.";

                        if (user.Is_Verified == 1) {
                            document.getElementById('pub-verified').style.display = 'inline-block';
                        }

                        // Load Reviews
                        const reviewsContainer = document.getElementById('pub-reviews-container');
                        if (data.reviews && data.reviews.length > 0) {
                            data.reviews.forEach((rev, index) => {
                                let stars = '⭐'.repeat(rev.Rating);
                                let divider = index !== data.reviews.length - 1 ? '<div class="line"></div>' : '';
                                reviewsContainer.innerHTML += `
                                    <div class="review-item">
                                        <div class="review-top">
                                            <img src="${rev.ReviewerPic || 'images/PFP.jpg'}" class="review-pic" onerror="this.src='images/PFP.jpg'">
                                            <span class="review-name">${rev.ReviewerName} <span class="stars">${stars}</span></span>
                                        </div>
                                        <p class="review-text">"${rev.Comment}"</p>
                                    </div>
                                    ${divider}
                                `;
                            });
                        } else {
                            reviewsContainer.innerHTML += '<p style="color: #6c637e;">No reviews yet.</p>';
                        }
                    } else {
                        document.querySelector('.profile-grid').innerHTML = `<h2 style='color: #ff4d4d;'>${data.message}</h2>`;
                    }
                })
                .catch(err => console.error(err));
        });
    </script>
</body>
</html>
