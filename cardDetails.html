        <script>

            // AUTO SPACE CARD NUMBER

            const cardInput =
                document.querySelector('#card-number');

            cardInput.addEventListener('input', function (e) {

                let value =
                    e.target.value.replace(/\s/g, '');

                let formatted =
                    value.match(/.{1,4}/g);

                if (formatted) {

                    e.target.value =
                        formatted.join(' ');

                }

            });



            // FORM VALIDATION AND PAYMENT PROCESSING
            const form = document.querySelector('#payment-form');

            form.addEventListener('submit', function (e) {
                e.preventDefault(); // Stop the form from doing a default HTML submit

                const cardNumber = document.querySelector('#card-number').value;
                const month = document.querySelector('#month').value;
                const year = document.querySelector('#year').value;
                const cardName = document.querySelector('#card-name').value;
                const cvv = document.querySelector('#cvv').value;

                if (cardNumber.length < 19 || month === '' || year === '' || cardName === '' || cvv.length < 3) {
                    alert('Please complete all card details.');
                    return;
                }

                // 1. Get the TaskID we are paying for from the URL bar (e.g., ?id=5)
                const urlParams = new URLSearchParams(window.location.search);
                const taskId = urlParams.get('id');

                if (!taskId) {
                    alert("Error: Cannot find the task you are trying to pay for.");
                    return;
                }

                // Change button text to show it's processing
                const payBtn = document.querySelector('.pay-btn');
                payBtn.textContent = "Processing RM...";
                payBtn.disabled = true;

                // 2. Send the payment request to our Escrow Backend
                fetch('includes/php/process_payment.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        task_id: taskId,
                        method: 'Online Banking'
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'success') {
                            alert("Payment Successful! Funds are safely held in Escrow.");
                            // Redirect the Poster to the live tracking page so they can watch the runner's progress
                            window.location.href = `taskprogressposter.html?id=${taskId}`;
                        } else {
                            alert("Payment Failed: " + data.message);
                            payBtn.textContent = "Pay";
                            payBtn.disabled = false;
                        }
                    })
                    .catch(error => {
                        console.error("Error processing payment:", error);
                        alert("A network error occurred. Please try again.");
                        payBtn.textContent = "Pay";
                        payBtn.disabled = false;
                    });
            });

        </script>

    </body>
