<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus TaskHub - Profile Settings</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/profile.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic">
            </a>
        </div>
    </header>

    <main class="profile-container">
        <h1 class="page-title">Profile Settings</h1>
        <a href="myProfile.html" class="back-link">← Back to Profile</a>

        <form action="includes/php/update_profile.php" method="POST" enctype="multipart/form-data">

            <div class="settings-card">
                <span class="section-label">Profile Photo</span>
                <div class="avatar-section">
                    <div class="avatar-preview" id="avatar-preview-div"></div>
                    <div class="upload-controls">
                        <input type="file" name="profile_avatar" id="avatar-input" style="display: none;"
                            onchange="previewImage(this)">
                        <button type="button" class="btn-change-photo"
                            onclick="document.getElementById('avatar-input').click()">Change Photo</button>
                        <div class="upload-meta">JPG or PNG, max 2MB</div>
                    </div>
                </div>
            </div>

            <div class="profile-grid">
                <div class="settings-card input-row-group">
                    <span class="section-label">Personal Info</span>

                    <div class="field-block">
                        <label>Full name</label>
                        <input type="text" name="fullname" class="form-input"
                            placeholder="e.g. Cristiano Ronaldo bin Messi">
                    </div>

                    <div class="field-block">
                        <label>Nickname</label>
                        <input type="text" name="nickname" class="form-input" placeholder="EpicGamer25">
                    </div>

                    <div class="field-block">
                        <label>Student ID</label>
                        <input type="text" name="student_id" class="form-input" placeholder="D032412345">
                    </div>

                    <div class="field-block">
                        <label>Faculty</label>
                        <input type="text" name="faculty" class="form-input" placeholder="e.g. FTMK">
                    </div>
                </div>

                <div class="settings-card flex-between-column">
                    <div class="input-row-group">
                        <div class="input-split">
                            <div class="field-block">
                                <label>Phone</label>
                                <input type="text" name="phone" class="form-input" placeholder="+60 11-1234 5678">
                            </div>
                            <div class="field-block">
                                <label>Email</label>
                                <input type="email" name="email" class="form-input"
                                    placeholder="d032412345@student.utem.edu.my">
                            </div>
                        </div>

                        <div class="field-block">
                            <label>Bio</label>
                            <textarea name="bio" class="form-textarea"
                                placeholder="Tell people a bit about yourself..."></textarea>
                        </div>
                    </div>

                    <div class="actions-panel">
                        <button type="submit" class="btn-save-action">Save Changes</button>
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <span class="section-label">Security</span>

                <div class="security-row">
                    <span class="security-text">Change Password</span>
                    <button type="button" class="btn-sec-outline">Update</button>
                </div>

                <div class="security-row">
                    <span class="security-text">Two-Step Verification</span>
                    <label class="switch-wrapper">
                        <input type="checkbox" name="two_step" id="two-step-toggle">
                        <span class="slider-trail"></span>
                    </label>
                </div>

                <div class="security-row">
                    <span class="security-text">Delete Account</span>
                    <button type="button" class="btn-sec-danger">Delete</button>
                </div>
            </div>

        </form>
    </main>

    <script>
        // 1. Function to immediately preview the newly selected image
        function previewImage(input) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('avatar-preview-div').style.backgroundImage = "url('" + e.target.result + "')";
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.addEventListener("DOMContentLoaded", function () {

            fetch('includes/php/get_profile.php')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        const user = data.user;

                        // Fill in text inputs
                        document.querySelector('input[name="fullname"]').value = user.FullName || '';
                        document.querySelector('input[name="nickname"]').value = user.Username || '';
                        document.querySelector('input[name="student_id"]').value = user.StudentID || '';
                        document.querySelector('input[name="faculty"]').value = user.Faculty || '';
                        document.querySelector('input[name="phone"]').value = user.Phone || '';
                        document.querySelector('input[name="email"]').value = user.Email || '';

                        // Fill in Bio (Checking for exact DB column name)
                        document.querySelector('textarea[name="bio"]').value = user['Bio_Text'] || user['Bio Text'] || '';

                        // Show current avatar from DB
                        const preview = document.getElementById('avatar-preview-div');
                        const picUrl = user['Profile_Pic_URL'] ? user['Profile_Pic_URL'] : 'images/PFP.jpg';
                        preview.style.backgroundImage = `url('${picUrl}')`;
                        preview.style.backgroundSize = 'cover';
                        preview.style.backgroundPosition = 'center';

                        // Set the Two-Step Verification toggle
                        if (user['Two_Factor_Enabled'] == 1) {
                            document.getElementById('two-step-toggle').checked = true;
                        }
                    } else {
                        console.error("Failed to load profile data:", data.message);
                    }
                })
                .catch(error => {
                    console.error("Error fetching profile:", error);
                });
        });
    </script>
</body>

</html>
