<!DOCTYPE html>
<html lang="en">
<head>
    <title>SIGN UP</title>
    <link rel="stylesheet" href="/CAMPUS_TASKHUB/css/signup.css" />
    </head>

<body>
    <nav class="top-menu">
        <span class="campus">CAMPUS</span>
        <span class="taskhub">TASKHUB</span>
    </nav>

    <main class="container">
        <section class="left">
            <h1 class="hustle">HUSTLE</h1>
            <h1 class="hustle2">AND CHANGE YOUR FUTURE</h1>
            <h2 class="loginnow"><a href="/CAMPUS_TASKHUB/login.html">LOG IN NOW -></a></h2>
        </section>

        <section class="right">
            <section class="welcome-container">
                <span class="welcometo">Welcome to</span>
                <span class="ctask">CTASK</span>
            </section>

            <form action="/CAMPUS_TASKHUB/includes/signup_handler.php" method="POST">
                <section class="form-container">
                    <label class="label">Username:</label>
                    <input class="input" name="username" type="text" placeholder="e.g: campustaskhub123" required>

                    <label class="label">Password:</label>
                    <input class="input" name="password" type="password" placeholder="e.g: taskhub@27" required>

                    <label class="label">Confirm Password:</label>
                    <input class="input" name="confirm_password" type="password" placeholder="e.g: taskhub@27" required>

                    <label class="label">Email:</label>
                    <input class="input" name="email" type="email" placeholder="e.g: d012345678@student.utem.edu.my" required>

                    <button type="submit">SIGN UP</button>
                </section>
            </form>
        </section>
    </main>
</body>
</html>
