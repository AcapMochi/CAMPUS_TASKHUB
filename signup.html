<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Campus TaskHub</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body class="auth-body">

    <main class="auth-container">
        
        <div class="auth-header">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
            </a>
            <p class="auth-subtitle">Create an account and start earning on campus.</p>
        </div>

        <div class="auth-card">
            <form action="includes/php/signup_handler.php" method="POST">
                
                <div class="field-block">
                    <label>Username</label>
                    <input type="text" name="username" class="form-input" placeholder="Choose a nickname" required>
                </div>

                <div class="field-block">
                    <label>Student Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="e.g. d032410118@student.utem.edu.my" required>
                    <small style="color: #6c637e; font-size: 0.75rem; margin-top: 5px;">Your Student ID will be securely pulled from this email.</small>
                </div>

                <div class="field-block">
                    <label>Password</label>
                    <input type="password" name="password" class="form-input" placeholder="Create a password" required>
                </div>

                <button type="submit" class="btn-primary-full" style="margin-top: 25px;">Create Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="register-link">Log in here</a></p>
            </div>
        </div>

    </main>

</body>
</html>
