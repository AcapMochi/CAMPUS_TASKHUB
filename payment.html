<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/payment.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>
    
    <header class="navbar">
        <div class="logo">
            <span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span>
        </div>

        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>

        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html">
                <img src="images/PFP.jpg" alt="Profile" class="profile-pic">
            </a>
        </div>
    </header>

    <div class="container">

        <h1 class="page-title">Payment</h1>

        <hr class="divider">

        <a href="posttasks.html" class="back-btn">← Back to Post</a>

        <form action="TaskDonePoster.html" method="get">

            <div class="payment-card">

                <div class="summary-box">

                    <p class="summary-title">TASK SUMMARY</p>

                    <div class="row">
                        <span>Belikan Makanan</span>
                    </div>

                    <div class="line"></div>

                    <div class="row">
                        <span class="label">Task reward</span>
                        <span class="price">RM 10.00</span>
                    </div>

                    <div class="row">
                        <span class="label">Platform fee</span>
                        <span class="fee">RM 0.50</span>
                    </div>

                    <div class="line"></div>

                    <div class="row total">
                        <span>Total</span>
                        <span class="price">RM 10.50</span>
                    </div>

                </div>

                <div class="method-box">

                    <p class="method-title">PAYMENT METHOD</p>

                    <label class="method">
                        <input type="radio" name="payment" checked>
                        Online Banking
                    </label>

                    <label class="method">
                        <input type="radio" name="payment">
                        Touch 'n Go eWallet
                    </label>

                </div>

                <button type="submit" class="pay-btn">
                    Confirm & Pay RM 10.50
                </button>

                <p class="note">
                    Payment is released to runner only after you confirm task completion.
                </p>

            </div>

        </form>

    </div>

</body>

</html>
