<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/payment.css">
    <script src="includes/js/auth.js"></script>
</head>

<body>

    <header class="navbar">
        <div class="logo"><span class="campus">CAMPUS </span><span class="taskhub">TASKHUB</span></div>
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="browseTask.html">Browse Tasks</a>
            <a href="posttasks.html">Post Task</a>
            <a href="mytasks.html">My Tasks</a>
            <a href="leaderboard.html">Leaderboard</a>
        </nav>
        <div class="header-icons">
            <a href="chatpage.html" style="text-decoration: none; font-size: 20px;">💬</a>
            <a href="myProfile.html"><img src="images/PFP.jpg" alt="Profile" class="profile-pic" onerror="this.src='images/pfp1.jpg'"></a>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Payment</h1>
        <hr class="divider">
        <a href="posttasks.html" class="back-btn">← Back to Post</a>

        <div class="payment-card">
            <div class="summary-box">
                <p class="summary-title">TASK SUMMARY</p>
                <div class="row"><span id="task-title">Loading task...</span></div>
                <div class="line"></div>
                <div class="row">
                    <span class="label">Task reward</span>
                    <span class="price" id="task-reward">RM 0.00</span>
                </div>
                <div class="row">
                    <span class="label">Platform fee</span>
                    <span class="fee">RM 0.50</span>
                </div>
                <div class="line"></div>
                <div class="row total">
                    <span>Total</span>
                    <span class="price" id="task-total">RM 0.50</span>
                </div>
            </div>

            <button id="verify-payment-btn" class="pay-btn">Confirm & Pay</button>

            <p class="note">Payment is held securely in Stripe and released only after confirmation.</p>
        </div>
    </div>

    <script>
        // 1. Fetch Task details when page loads
        document.addEventListener("DOMContentLoaded", function () {
            const urlParams = new URLSearchParams(window.location.search);
            const taskId = urlParams.get('id');
            // 1. Fetch Task details
            if (taskId) {
                // Note: No leading slash. This looks relative to payment.html
                fetch('includes/php/get_task_details.php?id=' + taskId)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') {
                            const reward = parseFloat(data.task.Reward_Amount);
                            const total = reward + 0.50;
                            document.getElementById('task-title').innerText = data.task.Title;
                            document.getElementById('task-reward').innerText = 'RM ' + reward.toFixed(2);
                            document.getElementById('task-total').innerText = 'RM ' + total.toFixed(2);
                            document.getElementById('verify-payment-btn').innerText = 'Confirm & Pay RM ' + total.toFixed(2);
                        } else {
                            console.error("Server error:", data.message);
                        }
                    })
                    .catch(err => console.error("Fetch failed:", err));
            }

            // 2. Stripe Payment Logic
            const payBtn = document.getElementById('verify-payment-btn');
            payBtn.addEventListener('click', function () {
                payBtn.disabled = true;
                payBtn.innerText = "Connecting to Secure Checkout...";

                fetch('includes/php/create_checkout.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ task_id: taskId })
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'success') window.location.href = data.url;
                        else { alert("Error: " + data.message); payBtn.disabled = false; }
                    });
            });
        });
    </script>
</body>

</html>
